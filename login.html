<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acessar Precificador</title>
</head>
<body style="font-family: Arial;">

  <div style="max-width:400px;margin:80px auto;text-align:center;">
    <h2>Acessar calculadora</h2>
    <p>Digite o e-mail usado na compra</p>

    <input id="email" type="email" placeholder="seu@email.com"
      style="width:100%;height:48px;border-radius:12px;border:1px solid #ccc;padding:0 10px;font-size:16px;">

    <button id="loginBtn" type="button"
      style="width:100%;height:48px;margin-top:12px;border-radius:12px;border:0;background:#39b6a0;color:#fff;font-weight:700;cursor:pointer;">
      Receber link de acesso
    </button>

    <p id="msg" style="margin-top:12px;color:#666;"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://qdccvgsubngerbydekpi.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkY2N2Z3N1Ym5nZXJieWRla3BpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MzQ3MTQsImV4cCI6MjA5MzExMDcxNH0.hvQ-_20waDJ57gi4j1UtNmmI5_UPsSs49-X5rBHYrno"
    );

    document.getElementById("loginBtn").addEventListener("click", async function () {
      const email = document.getElementById("email").value.trim();
      const msg = document.getElementById("msg");
      const btn = document.getElementById("loginBtn");

      if (!email) {
        msg.innerText = "Digite um e-mail";
        return;
      }

      btn.innerText = "Enviando...";
      btn.disabled = true;

      const { error } = await supabaseClient.auth.signInWithOtp({
        email: email,
        options: {
          emailRedirectTo: window.location.origin + "/app.html"
        }
      });

      if (error) {
        msg.innerText = "Erro: " + error.message;
        btn.innerText = "Receber link de acesso";
        btn.disabled = false;
        return;
      }

      msg.innerText = "Link enviado! Verifique seu e-mail 📩";
      btn.innerText = "Link enviado";
    });
  </script>

</body>
</html>
